name: Benchmarks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: bench-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'

jobs:
  bench:
    name: Bench
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: corepack enable

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true

      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy,rustfmt

      - uses: Swatinem/rust-cache@v2

      - run: vp install --frozen-lockfile
      - run: vp build
      - run: pnpm run bench | tee bench-output.txt
        env:
          NO_COLOR: '1'
      - run: node tools/tasks/format-bench-comment.ts bench-output.txt > bench-comment.md

      - name: Comment benchmark result
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('node:fs')
            const marker = '<!-- oxlint-plugins-benchmark-comment -->'
            const body = fs.readFileSync('bench-comment.md', 'utf8')
            const { owner, repo } = context.repo
            const issue_number = context.issue.number
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            })
            const existing = comments.data.find((comment) => {
              return comment.user?.type === 'Bot' && comment.body?.includes(marker)
            })
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              })
            }
