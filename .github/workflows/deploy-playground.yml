name: Deploy Playground

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: corepack enable

      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: wasm32-unknown-unknown

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'v0.13.1'

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - run: pnpm install --frozen-lockfile

      - name: Build playground
        run: pnpm --filter @oxlint-plugins/playground build

      - name: Typecheck playground
        run: pnpm exec tsgo -p playground/tsconfig.json

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: playground/dist

  deploy:
    name: Deploy
    # Only publish from the default branch; pull requests just build to validate.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    # Serialize only the actual deploys, so PR build runs never queue behind them.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
